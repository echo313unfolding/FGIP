<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo - FGIP Assistant</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --border: #2a2a3a;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --accent: #00ff88;
            --accent-dim: #00cc6a;
            --danger: #ff4757;
            --warning: #ffaa00;
            --info: #4da6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-secondary);
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 18px;
        }

        .title {
            flex: 1;
        }

        .title h1 {
            font-size: 1.3em;
            color: var(--accent);
        }

        .title .subtitle {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
        }

        .status-dot.online {
            background: var(--accent);
        }

        /* Main content area */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .message-avatar.user {
            background: var(--info);
            color: #000;
        }

        .message-avatar.assistant {
            background: var(--accent);
            color: #000;
        }

        .message-role {
            font-size: 0.85em;
            font-weight: 600;
        }

        .message-role.user {
            color: var(--info);
        }

        .message-role.assistant {
            color: var(--accent);
        }

        .message-content {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            line-height: 1.6;
            font-size: 0.95em;
        }

        .message-content pre {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 0.85em;
        }

        .message-content code {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* Tool calls panel */
        .tool-calls {
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .tool-calls-header {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .tool-calls-header:hover {
            color: var(--accent);
        }

        .tool-call {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .tool-call-header {
            padding: 8px 12px;
            background: rgba(0, 255, 136, 0.1);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .tool-call-header:hover {
            background: rgba(0, 255, 136, 0.15);
        }

        .tool-name {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.85em;
        }

        .tool-args {
            font-size: 0.75em;
            color: var(--text-secondary);
        }

        .tool-result {
            padding: 10px 12px;
            font-size: 0.8em;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .tool-result.expanded {
            display: block;
        }

        .tool-result pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-form {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95em;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent);
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            padding: 14px 24px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-dim);
        }

        .send-btn:disabled {
            background: var(--border);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Thinking indicator */
        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        .thinking-dots {
            display: flex;
            gap: 4px;
        }

        .thinking-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .welcome h2 {
            color: var(--accent);
            margin-bottom: 16px;
            font-size: 1.5em;
        }

        .welcome p {
            max-width: 500px;
            margin: 0 auto 24px;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .suggestion {
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Trace toggle and cache pill */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trace-toggle {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .trace-toggle:hover {
            border-color: var(--text-secondary);
        }

        .trace-toggle.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        .cache-pill {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .cache-pill.hot { background: var(--accent); color: #000; }
        .cache-pill.warm { background: var(--warning); color: #000; }
        .cache-pill.cold { background: #444; color: #aaa; }
        .cache-pill.unknown { background: #333; color: #666; }

        /* Trace panel */
        .trace-panel {
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .trace-header {
            padding: 6px 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .trace-header:hover {
            background: var(--bg-tertiary);
        }

        .trace-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .trace-summary {
            color: var(--accent);
            font-family: monospace;
            font-size: 11px;
        }

        .trace-content {
            display: none;
            padding: 8px 10px;
            border-top: 1px solid var(--border);
        }

        .trace-panel.expanded .trace-content {
            display: block;
        }

        .trace-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid var(--bg-secondary);
        }

        .trace-row:last-child {
            border-bottom: none;
        }

        .trace-row span:first-child {
            color: var(--text-secondary);
        }

        .trace-row span:last-child {
            font-family: monospace;
            color: var(--text-primary);
        }

        .trace-row .hash {
            color: var(--text-secondary);
            font-size: 10px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">E</div>
        <div class="title">
            <h1>Echo</h1>
            <div class="subtitle">FGIP Knowledge Graph Assistant</div>
        </div>
        <div class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
        </div>
        <div class="header-controls">
            <span id="cachePill" class="cache-pill unknown">?</span>
            <button id="traceToggle" class="trace-toggle" onclick="toggleTrace()" title="Show/Hide Trace">Trace</button>
        </div>
    </header>

    <div class="main">
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <h2>Welcome to Echo</h2>
                    <p>I'm your assistant for exploring the FGIP knowledge graph. Ask me about organizations, people, legislation, and their relationships.</p>
                    <div class="suggestions">
                        <button class="suggestion" onclick="sendSuggestion('Search for Intel in the graph')">Search for Intel</button>
                        <button class="suggestion" onclick="sendSuggestion('What are the graph statistics?')">Graph stats</button>
                        <button class="suggestion" onclick="sendSuggestion('Show me connections to the CHIPS Act')">CHIPS Act connections</button>
                        <button class="suggestion" onclick="sendSuggestion('Find organizations with LOBBIED_FOR edges')">Lobbying relationships</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form class="input-form" id="chat-form" onsubmit="handleSubmit(event)">
                    <div class="input-wrapper">
                        <textarea
                            class="input-field"
                            id="input-field"
                            placeholder="Ask about the knowledge graph..."
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                        ></textarea>
                    </div>
                    <button type="submit" class="send-btn" id="send-btn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // State
        let sessionId = null;
        let isLoading = false;
        let messages = [];
        let showTrace = false;

        // Elements
        const messagesEl = document.getElementById('messages');
        const inputField = document.getElementById('input-field');
        const sendBtn = document.getElementById('send-btn');
        const welcomeEl = document.getElementById('welcome');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // Check health on load
        async function checkHealth() {
            try {
                const response = await fetch('/v1/health');
                const data = await response.json();

                if (data.status === 'ok') {
                    statusDot.classList.add('online');
                    statusText.textContent = `Connected (${data.model})`;
                } else {
                    statusText.textContent = 'Degraded';
                }
            } catch (e) {
                statusText.textContent = 'Offline';
            }
        }

        // Toggle trace visibility
        function toggleTrace() {
            showTrace = !showTrace;
            document.getElementById('traceToggle').classList.toggle('active', showTrace);
            renderMessages();
        }

        // Update cache status pill
        async function updateCacheStatus() {
            const pill = document.getElementById('cachePill');
            try {
                const resp = await fetch('/v1/cache_stats');
                const data = await resp.json();

                if (data.cache_stats && data.cache_stats.utilization_pct !== undefined) {
                    const pct = data.cache_stats.utilization_pct;
                    if (pct > 90) {
                        pill.textContent = 'HOT';
                        pill.className = 'cache-pill hot';
                    } else if (pct > 50) {
                        pill.textContent = 'WARM';
                        pill.className = 'cache-pill warm';
                    } else {
                        pill.textContent = 'COLD';
                        pill.className = 'cache-pill cold';
                    }
                } else if (data.cache_enabled === false) {
                    pill.textContent = 'N/A';
                    pill.className = 'cache-pill unknown';
                } else {
                    pill.textContent = 'COLD';
                    pill.className = 'cache-pill cold';
                }
            } catch (e) {
                pill.textContent = '?';
                pill.className = 'cache-pill unknown';
            }
        }

        // Send a message
        async function sendMessage(content) {
            if (!content.trim() || isLoading) return;

            // Hide welcome
            if (welcomeEl) {
                welcomeEl.style.display = 'none';
            }

            // Add user message
            messages.push({ role: 'user', content });
            renderMessages();

            // Show thinking indicator
            isLoading = true;
            sendBtn.disabled = true;
            showThinking();

            try {
                // Use unified /v1/task endpoint for routing + receipts
                const response = await fetch('/v1/task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task_type: 'chat',
                        payload: {
                            messages: messages,
                            max_tokens: 16,         // Short for debugging
                            temperature: 0.0,       // Deterministic
                            top_p: 1.0,
                            seed: 123
                        },
                        require_kat: false
                    })
                });

                const data = await response.json();

                // Store receipt for debugging (visible in console)
                if (data.receipt) {
                    console.log('Receipt:', data.receipt);
                }

                // Add assistant message
                if (data.success && data.result) {
                    messages.push({
                        role: 'assistant',
                        content: data.result.content,
                        receipt: data.receipt
                    });
                } else {
                    messages.push({
                        role: 'assistant',
                        content: `Error: ${data.errors?.join(', ') || 'Unknown error'}`,
                    });
                }

            } catch (e) {
                messages.push({
                    role: 'assistant',
                    content: `Error: ${e.message}`,
                });
            }

            isLoading = false;
            sendBtn.disabled = false;
            hideThinking();
            renderMessages();
            inputField.value = '';
        }

        // Render messages
        function renderMessages() {
            let html = '';

            messages.forEach(msg => {
                const avatar = msg.role === 'user' ? 'U' : 'E';
                const avatarClass = msg.role;
                const roleClass = msg.role;
                const roleLabel = msg.role === 'user' ? 'You' : 'Echo';

                // Build trace panel if enabled and receipt exists
                let traceHtml = '';
                if (showTrace && msg.receipt && msg.role === 'assistant') {
                    const r = msg.receipt;
                    traceHtml = `
                        <div class="trace-panel" onclick="this.classList.toggle('expanded')">
                            <div class="trace-header">
                                <span class="trace-label">Trace</span>
                                <span class="trace-summary">${r.duration_ms ? r.duration_ms.toFixed(0) + 'ms' : '?'} | ${r.router_path || r.backend_used || 'unknown'}</span>
                            </div>
                            <div class="trace-content">
                                <div class="trace-row"><span>Backend:</span><span>${r.backend_used || 'N/A'}</span></div>
                                <div class="trace-row"><span>Duration:</span><span>${r.duration_ms ? r.duration_ms.toFixed(2) + 'ms' : 'N/A'}</span></div>
                                <div class="trace-row"><span>Router:</span><span>${r.router_path || 'N/A'}</span></div>
                                <div class="trace-row"><span>Model:</span><span>${r.llm_model || 'N/A'}</span></div>
                                <div class="trace-row"><span>Timestamp:</span><span>${r.timestamp || 'N/A'}</span></div>
                                <div class="trace-row"><span>Input Hash:</span><span class="hash">${r.inputs_hash || 'N/A'}</span></div>
                                <div class="trace-row"><span>Output Hash:</span><span class="hash">${r.outputs_hash || 'N/A'}</span></div>
                            </div>
                        </div>
                    `;
                }

                html += `
                    <div class="message">
                        <div class="message-header">
                            <div class="message-avatar ${avatarClass}">${avatar}</div>
                            <span class="message-role ${roleClass}">${roleLabel}</span>
                        </div>
                        <div class="message-content">
                            ${formatContent(msg.content)}
                            ${msg.tool_calls ? renderToolCalls(msg.tool_calls) : ''}
                            ${traceHtml}
                        </div>
                    </div>
                `;
            });

            messagesEl.innerHTML = html;
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // Format message content
        function formatContent(content) {
            if (!content) return '';

            // Escape HTML
            let html = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Line breaks
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        // Render tool calls
        function renderToolCalls(toolCalls) {
            if (!toolCalls || !toolCalls.length) return '';

            let html = '<div class="tool-calls">';
            html += '<div class="tool-calls-header" onclick="toggleAllTools(this)">Tools Used (' + toolCalls.length + ')</div>';

            toolCalls.forEach((tc, i) => {
                const argsStr = JSON.stringify(tc.args, null, 2);
                const resultStr = JSON.stringify(tc.result, null, 2);

                html += `
                    <div class="tool-call">
                        <div class="tool-call-header" onclick="toggleTool(${i})">
                            <span class="tool-name">${tc.name}</span>
                            <span class="tool-args">${Object.keys(tc.args).join(', ')}</span>
                        </div>
                        <div class="tool-result" id="tool-result-${i}">
                            <pre>${escapeHtml(resultStr)}</pre>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function toggleTool(index) {
            const el = document.getElementById('tool-result-' + index);
            el.classList.toggle('expanded');
        }

        function toggleAllTools(header) {
            const toolResults = header.parentElement.querySelectorAll('.tool-result');
            const anyExpanded = Array.from(toolResults).some(el => el.classList.contains('expanded'));

            toolResults.forEach(el => {
                if (anyExpanded) {
                    el.classList.remove('expanded');
                } else {
                    el.classList.add('expanded');
                }
            });
        }

        // Show/hide thinking indicator
        function showThinking() {
            const thinkingHtml = `
                <div class="message" id="thinking">
                    <div class="message-header">
                        <div class="message-avatar assistant">E</div>
                        <span class="message-role assistant">Echo</span>
                    </div>
                    <div class="thinking">
                        <div class="thinking-dots">
                            <span></span><span></span><span></span>
                        </div>
                        <span>Thinking...</span>
                    </div>
                </div>
            `;
            messagesEl.insertAdjacentHTML('beforeend', thinkingHtml);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideThinking() {
            const thinkingEl = document.getElementById('thinking');
            if (thinkingEl) thinkingEl.remove();
        }

        // Handle form submit
        function handleSubmit(e) {
            e.preventDefault();
            sendMessage(inputField.value);
        }

        // Handle Enter key (submit on Enter, newline on Shift+Enter)
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(inputField.value);
            }
        }

        // Handle suggestion clicks
        function sendSuggestion(text) {
            inputField.value = text;
            sendMessage(text);
        }

        // Auto-resize textarea
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Initialize
        checkHealth();
        updateCacheStatus();

        // Poll cache status every 30 seconds
        setInterval(updateCacheStatus, 30000);
    </script>
</body>
</html>
